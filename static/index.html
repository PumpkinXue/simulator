<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUHU 素狐科技 - 皇帝后宫模拟器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- 引入刚刚分离出来的独立 CSS 文件 -->
    <link rel="stylesheet" href="./static/style.css">
</head>
<body>

    <!-- 1. 剧本选择界面 -->
    <div id="start-screen">
        <div class="brand-logo">SUHU 素狐科技</div>
        <h2 style="margin-bottom: 30px; font-weight: normal;">请选择你的剧本</h2>
        <div class="script-list">
            <div class="script-card" onclick="startGame('emperor')">
                <div style="font-size: 40px; margin-bottom: 10px;">👑</div>
                <h3>皇帝后宫模拟器</h3>
                <p>世袭继位，皇位正统。掌大权，御后宫。</p>
                <button class="btn-start">开始推演</button>
            </div>
            <!-- 可以添加更多剧本卡片 -->
        </div>
    </div>

    <!-- 2. 游戏主界面 -->
    <div id="game-screen" class="hidden">
        
        <!-- 顶部导航 -->
        <header>
            <div class="header-left">
                <i class="fa-solid fa-chess-king"></i> 皇帝后宫模拟器
                <span class="turn-badge"><i class="fa-regular fa-clock"></i> 回合 <span id="turn-display">1</span></span>
            </div>
            <div class="header-right">
                <button><i class="fa-solid fa-save"></i> 存档</button>
                <button><i class="fa-solid fa-cog"></i> 设置</button>
                <button onclick="location.reload()"><i class="fa-solid fa-sign-out-alt"></i> 退出</button>
            </div>
        </header>

        <!-- 三列布局区域 -->
        <div class="main-layout">
            
            <!-- 左侧面板：角色与属性 -->
            <aside class="side-panel">
                <div class="panel-card">
                    <div class="avatar-box">
                        <div class="avatar-circle"><i class="fa-solid fa-user-tie"></i></div>
                        <div class="char-name">胡朝翰</div>
                        <div class="char-tags">
                            <span>男</span><span>世袭继位</span><span>平静</span>
                        </div>
                    </div>
                    <div class="panel-title"><i class="fa-solid fa-chart-bar"></i> 属性</div>
                    <div class="attr-row"><span><i class="fa-solid fa-cake-candles"></i> 年龄</span> <span id="attr-age">20</span></div>
                    <div class="attr-row"><span><i class="fa-solid fa-heart"></i> 体质</span> <span id="attr-hp">75</span></div>
                    <div class="attr-row"><span><i class="fa-solid fa-book-open"></i> 才华</span> <span id="attr-tal">68</span></div>
                    <div class="attr-row"><span><i class="fa-solid fa-balance-scale"></i> 道德</span> <span id="attr-mor">50</span></div>
                </div>
                
                <div class="panel-card">
                    <div class="panel-title"><i class="fa-solid fa-user-group"></i> 人脉 (开发中)</div>
                    <p style="font-size: 12px; color: var(--text-light); text-align: center;">暂无人物数据</p>
                </div>
            </aside>

            <!-- 中间面板：主舞台 -->
            <main class="center-stage">
                <!-- 剧情文本区 -->
                <div class="story-container" id="story-container">
                    <div id="narrative-content">
                        <!-- 动态生成的剧情和对话 -->
                        <div class="story-paragraph">大梦初醒，你缓缓睁开眼睛。太监总管李玉恭敬地候在床榻边：“皇上，该翻牌子了，亦或者去御书房批阅奏折？”</div>
                        <div class="story-paragraph" style="color: var(--text-light); font-size: 13px;">请在下方选择你的行动，或在右侧选择待办事件。</div>
                    </div>
                    <div class="clear"></div> <!-- 清除浮动 -->
                </div>

                <!-- 操作区 -->
                <div class="action-area">
                    <div class="action-toggle-btn" onclick="toggleChoices()" id="toggle-btn">
                        <i class="fa-solid fa-gamepad"></i> 展开行动选项 <span id="choice-count">0</span> <i class="fa-solid fa-chevron-up"></i>
                    </div>
                    
                    <div id="choices-container" class="choices-wrapper hidden">
                        <!-- 选项按钮由JS生成 -->
                    </div>

                    <div class="custom-input-box">
                        <input type="text" id="custom-action" placeholder="输入自定义行动 (如：传唤皇后)..." onkeypress="handleEnter(event)">
                        <button onclick="submitAction('custom')"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>
            </main>

            <!-- 右侧面板：事件与资产 -->
            <aside class="side-panel">
                <div class="panel-card">
                    <div class="panel-title"><i class="fa-solid fa-flag"></i> 关键事件 <span style="background:var(--primary-color); color:white; border-radius:10px; padding:0 6px; font-size:10px;" id="event-count">1</span></div>
                    <div id="events-wrapper">
                        <!-- 事件列表由JS生成 -->
                    </div>
                </div>

                <div class="panel-card">
                    <div class="panel-title"><i class="fa-solid fa-gem"></i> 资产</div>
                    <div class="event-item" style="border-left-color: #7b9e87;">
                        <h4>传国玉玺</h4>
                        <p>皇权正统的象征，受命于天，既寿永昌。</p>
                    </div>
                </div>
            </aside>

        </div>
    </div>

<script>
    // 核心状态管理
    const GameState = {
        turn: 1,
        max_turns: 229,
        attributes: { "age": 20, "hp": 75, "tal": 68, "mor": 50 },
        events:[
            { id: 'evt_01', name: '新皇登基', desc: '朝堂未稳，太后在后宫安插眼线。你需要妥善处理与太后的关系。', turns_left: 3, completed: false }
        ],
        currentActiveEventId: null
    };

    let isStreaming = false;
    let isChoicesExpanded = false;

    // 1. 开始游戏
    function startGame(scriptId) {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        renderEvents();
        // 初始化一些模拟的初始选项
        renderChoices(["去慈宁宫请安", "去御书房议事", "微服私访"]);
    }

    // 2. 渲染事件列表 (右侧)
    function renderEvents() {
        const wrapper = document.getElementById('events-wrapper');
        wrapper.innerHTML = '';
        let activeCount = 0;
        
        GameState.events.forEach(evt => {
            if(evt.completed) return; 
            activeCount++;
            const div = document.createElement('div');
            div.className = 'event-item';
            div.innerHTML = `
                <h4>${evt.name}</h4>
                <p>${evt.desc}</p>
                <div class="event-meta"><i class="fa-regular fa-clock"></i> 剩余 ${evt.turns_left} 回合</div>
            `;
            // 点击事件，将其设为当前处理目标
            div.onclick = () => {
                GameState.currentActiveEventId = evt.id;
                appendStory(`<i>(开始处理事件：${evt.name})</i>`, true);
            };
            wrapper.appendChild(div);
        });
        
        document.getElementById('event-count').innerText = activeCount;
    }

    // 3. 控制展开/折叠选项
    function toggleChoices(forceShow = false) {
        const container = document.getElementById('choices-container');
        const btn = document.getElementById('toggle-btn');
        
        if(forceShow) isChoicesExpanded = false; // 强制展开逻辑

        if(isChoicesExpanded) {
            container.classList.add('hidden');
            btn.innerHTML = `<i class="fa-solid fa-gamepad"></i> 展开行动选项 ${container.children.length} <i class="fa-solid fa-chevron-up"></i>`;
        } else {
            container.classList.remove('hidden');
            btn.innerHTML = `<i class="fa-solid fa-gamepad"></i> 收起选项 <i class="fa-solid fa-chevron-down"></i>`;
        }
        isChoicesExpanded = !isChoicesExpanded;
    }

    // 4. 渲染大模型给出的选项
    function renderChoices(choices) {
        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        if(!choices || choices.length === 0) {
            document.getElementById('choice-count').innerText = 0;
            return;
        }
        
        document.getElementById('choice-count').innerText = choices.length;
        
        choices.forEach(c => {
            const btn = document.createElement('div');
            btn.className = 'choice-btn';
            btn.innerText = c;
            btn.onclick = () => submitAction('choice', c);
            container.appendChild(btn);
        });
        
        toggleChoices(true); // 生成新选项后自动展开
    }

    // 5. 往剧情舞台添加文字
    function appendStory(text, isSystem = false) {
        const content = document.getElementById('narrative-content');
        const p = document.createElement('div');
        if(isSystem) {
            p.className = 'story-paragraph';
            p.style.color = 'var(--text-light)';
            p.innerHTML = text;
        } else {
            p.className = 'story-paragraph';
            p.innerText = text;
        }
        content.appendChild(p);
        scrollToBottom();
        return p; // 返回节点方便后续流式追加
    }

    // 添加玩家自己的发言气泡
    function appendUserBubble(text) {
        const content = document.getElementById('narrative-content');
        const div = document.createElement('div');
        div.className = 'user-choice-bubble';
        div.innerText = text;
        content.appendChild(div);
        
        const clear = document.createElement('div');
        clear.className = 'clear';
        content.appendChild(clear);
        scrollToBottom();
    }

    function scrollToBottom() {
        const container = document.getElementById('story-container');
        container.scrollTop = container.scrollHeight;
    }

    function handleEnter(e) {
        if(e.key === 'Enter') submitAction('custom');
    }

    // 6. 核心：提交行动并接收流式输出
    async function submitAction(type, value) {
        if (isStreaming) return;
        
        let playerAction = type === 'custom' ? document.getElementById('custom-action').value.trim() : value;
        if (!playerAction) return;
        
        if (type === 'custom') document.getElementById('custom-action').value = '';

        // UI 表现：折叠选项、展示玩家气泡
        if(isChoicesExpanded) toggleChoices();
        appendUserBubble(playerAction);

        const evt = GameState.events.find(e => e.id === GameState.currentActiveEventId) || {};
        
        isStreaming = true;
        const currentParagraph = appendStory(""); // 创建一个空的段落用于接收流
        currentParagraph.classList.add('typing');

        try {
            // 调用后端的 /api/chat
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    state: GameState,
                    input: playerAction,
                    event: evt
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let fullText = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');
                
                for (let line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6);
                        try {
                            const dataObj = JSON.parse(dataStr);
                            if (dataObj.text) {
                                fullText += dataObj.text;
                                // 分离普通文本和结尾的 JSON
                                currentParagraph.innerText = fullText.split('===JSON===')[0];
                                scrollToBottom();
                            }
                        } catch (e) {}
                    }
                }
            }

            // 流式结束，处理返回的 JSON 数据
            currentParagraph.classList.remove('typing');
            isStreaming = false;
            
            if(fullText.includes("===JSON===")) {
                let jsonStr = fullText.split('===JSON===')[1].trim();
                
                // 【新增：强力清洗大模型格式】
                // 1. 去除大模型经常附带的 markdown 格式 (```json 和 ```)
                jsonStr = jsonStr.replace(/```json/gi, '').replace(/```/gi, '').trim();
                
                // 2. 截取最外层的 { } 确保即使大模型在后面加了废话也能提取成功
                const startIdx = jsonStr.indexOf('{');
                const endIdx = jsonStr.lastIndexOf('}');
                if (startIdx !== -1 && endIdx !== -1) {
                    jsonStr = jsonStr.substring(startIdx, endIdx + 1);
                }

                let llmResult = {};
                try {
                    llmResult = JSON.parse(jsonStr);
                } catch (parseError) {
                    console.error("JSON 解析失败! 原始提取的字符串为:", jsonStr);
                    // 即使解析失败，也不要让整个系统崩溃，给一套默认选项
                    llmResult = { choices:["顺其自然", "再思索一番"] }; 
                }
                
                // 渲染新选项
                renderChoices(llmResult.choices ||[]);
                
                // 处理事件完结
                if(llmResult.event_completed && evt.id) {
                    evt.completed = true;
                    appendStory(`【事件完成】${llmResult.impact_summary}`, true);
                    GameState.currentActiveEventId = null;
                    
                    // 推进回合
                    GameState.turn += 1;
                    document.getElementById('turn-display').innerText = GameState.turn;
                    GameState.events.forEach(e => { if(!e.completed) e.turns_left--; });
                }
                
                // 衍生新事件
                if(llmResult.new_events && llmResult.new_events.length > 0) {
                    GameState.events.push(...llmResult.new_events);
                    appendStory(`<i>(触发了新事件，请查看右侧面板)</i>`, true);
                }
                
                // 更新属性
                if(llmResult.attr_changes) {
                    for(let key in llmResult.attr_changes) {
                        if(key === '体质') GameState.attributes.hp += llmResult.attr_changes[key];
                        if(key === '才华') GameState.attributes.tal += llmResult.attr_changes[key];
                        if(key === '道德') GameState.attributes.mor += llmResult.attr_changes[key];
                    }
                    document.getElementById('attr-hp').innerText = GameState.attributes.hp;
                    document.getElementById('attr-tal').innerText = GameState.attributes.tal;
                    document.getElementById('attr-mor').innerText = GameState.attributes.mor;
                }
                
                renderEvents(); // 更新右侧 UI
            }

        } catch (error) {
            console.error(error);
            currentParagraph.innerText += "\n[系统异常，天机受阻，请重试]";
            isStreaming = false;
            currentParagraph.classList.remove('typing');
        }
    }
</script>
</body>
</html>
